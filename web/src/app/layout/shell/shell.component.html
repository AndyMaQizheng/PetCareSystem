<mat-sidenav-container class="shell-container">
  <mat-sidenav
    class="app-sidenav"
    [mode]="isHandset() ? 'over' : 'side'"
    [fixedInViewport]="isHandset()"
    #drawer
  >
    <div class="sidenav-header">
      <div class="logo">PetCare</div>
      <div class="subtitle">宠物健康驾驶舱</div>
    </div>
    <mat-divider></mat-divider>
    <mat-nav-list>
      <a mat-list-item *ngFor="let item of navItems" [routerLink]="item.link" routerLinkActive="active">
        <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
        <span matListItemTitle>{{ item.label }}</span>
        <span class="badge" *ngIf="item.badge">{{ item.badge }}</span>
      </a>
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content>
    <mat-toolbar color="primary" class="app-toolbar">
      <button mat-icon-button class="menu-button" (click)="drawer.toggle()" *ngIf="isHandset()">
        <mat-icon>menu</mat-icon>
      </button>
      <span class="toolbar-title">PetCare System</span>
      <span class="toolbar-subtitle">全渠道宠物健康 + 看护协同平台</span>
      <span class="spacer"></span>
      <button mat-icon-button>
        <mat-icon>refresh</mat-icon>
      </button>
      <button mat-icon-button>
        <mat-icon>dark_mode</mat-icon>
      </button>
      <button mat-icon-button>
        <mat-icon>account_circle</mat-icon>
      </button>
    </mat-toolbar>

    <div class="content">
      <router-outlet />
    </div>
  </mat-sidenav-content>
</mat-sidenav-container>
