version: "3.9"

services:
  mysql:
    image: mysql:8.0
    command: ["mysqld", "--default-authentication-plugin=mysql_native_password", "--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci"]
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
      - mysql-backups:/backups
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: petcare-backend:latest
    build:
      context: ..
      dockerfile: infra/Dockerfiles/backend.Dockerfile
    env_file:
      - .env
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://${DB_HOST:-mysql}:${DB_PORT:-3306}/${DB_NAME}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=${TIMEZONE:-UTC}
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
      WECHAT_APP_ID: ${WECHAT_APP_ID}
      WECHAT_APP_SECRET: ${WECHAT_APP_SECRET}
      REMINDER_LEAD_DAYS: ${REMINDER_LEAD_DAYS:-7}
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-8}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRY_MINUTES: ${JWT_EXPIRY_MINUTES:-15}
      REFRESH_EXPIRY_DAYS: ${REFRESH_EXPIRY_DAYS:-30}
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  scheduler:
    image: petcare-backend:latest
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: scheduler
      SPRING_DATASOURCE_URL: jdbc:mysql://${DB_HOST:-mysql}:${DB_PORT:-3306}/${DB_NAME}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=${TIMEZONE:-UTC}
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
      WECHAT_APP_ID: ${WECHAT_APP_ID}
      WECHAT_APP_SECRET: ${WECHAT_APP_SECRET}
      REMINDER_LEAD_DAYS: ${REMINDER_LEAD_DAYS:-7}
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-8}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRY_MINUTES: ${JWT_EXPIRY_MINUTES:-15}
      REFRESH_EXPIRY_DAYS: ${REFRESH_EXPIRY_DAYS:-30}
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  web:
    image: petcare-web:latest
    build:
      context: ..
      dockerfile: infra/Dockerfiles/web.Dockerfile
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      backend:
        condition: service_started
      web:
        condition: service_started
    ports:
      - "80:80"
    volumes:
      - ./nginx/reverse-proxy.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

volumes:
  mysql-data:
  mysql-backups:
